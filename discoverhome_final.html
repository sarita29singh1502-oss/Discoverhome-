<title>DiscoverHome</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F9FAFB;color:#111827;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:'Inter',sans-serif}
::-webkit-scrollbar{display:none}
.screen{min-height:100vh;background:#F9FAFB;padding-bottom:85px}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.07);overflow:hidden}
.btn-blue{background:#2563EB;color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15px;cursor:pointer;width:100%}
.btn-green{background:#10B981;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:700;font-size:14px;cursor:pointer}
.btn-outline-green{background:#fff;color:#10B981;border:2px solid #10B981;border-radius:12px;padding:11px 16px;font-weight:700;font-size:14px;cursor:pointer}
.pill{padding:8px 16px;border-radius:20px;border:1.5px solid #E5E7EB;background:#F3F4F6;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;color:#374151}
.pill.active{background:#2563EB;color:#fff;border-color:#2563EB}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #E5E7EB;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;cursor:pointer;gap:3px;color:#9CA3AF;font-size:10px;font-weight:600}
.ni.active{color:#2563EB}
.ifield{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid #E5E7EB;font-size:15px;background:#fff;outline:none;color:#111827}
.ifield:focus{border-color:#2563EB}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-rent{background:#DBEAFE;color:#1D4ED8}
.badge-sale{background:#D1FAE5;color:#065F46}
.badge-ok{background:#D1FAE5;color:#065F46}
.stitle{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:#111827;margin-bottom:14px}
.tlabel{font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.ani{animation:fu 0.3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.emsg{color:#EF4444;font-size:11px;margin-top:3px}
</style>

const sb=async(path,opts={})=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:opts.prefer||"return=representation",...(opts.headers||{})},
    ...opts});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):[];
};
const uploadImg=async(file)=>{
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLOUDINARY_PRESET);fd.append("cloud_name",CLOUDINARY_CLOUD);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:fd});
  const d=await res.json();if(d.error)throw new Error("Cloudinary: "+d.error.message);
  if(!d.secure_url)throw new Error("Upload failed");return d.secure_url;
};
const fmtPrice=(price,status)=>{
  if(!price)return"—";if(status==="For Rent")return`₹${Number(price).toLocaleString()}/mo`;
  const n=Number(price);if(n>=10000000)return`₹${(n/10000000).toFixed(1)}Cr`;
  if(n>=100000)return`₹${(n/100000).toFixed(1)}L`;return`₹${n.toLocaleString()}`;
};

  const [se,setSe]=useState({});
  const upSf=(k,v)=>setSf(p=>({...p,[k]:v}));
  const sendOtp=()=>{if(!phone||phone.length<10){setErr("Invalid phone number");return;}setErr("");setMode("otp");};

  if(mode==="welcome")return(

/* ADD PROPERTY */
function AddScreen(){
  const [form,setForm]=useState({title:"",type:"Residential",status:"For Sale",price:"",bhk:"2 BHK",location:"",area:"",furnishing:"Semi-Furnished",available:"",description:"",owner_name:"",owner_email:"",owner_phone:"",tag:"New"});
  const [imgFile,setImgFile]=useState(null);const [imgPrev,setImgPrev]=useState(null);
  const [loading,setLoading]=useState(false);const [done,setDone]=useState(false);
  const [err,setErr]=useState("");const [errs,setErrs]=useState({});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const val=()=>{const e={};if(!form.title.trim())e.title="Required";if(!form.price)e.price="Required";if(!form.location.trim())e.location="Required";if(!form.owner_name.trim())e.owner_name="Required";if(!form.owner_phone.trim())e.owner_phone="Required";return e;};
  const onImg=e=>{const file=e.target.files[0];if(!file)return;setImgFile(file);setImgPrev(URL.createObjectURL(file));};
  const submit=async()=>{
    const e=val();if(Object.keys(e).length>0){setErrs(e);setErr("Please fill all required fields");return;}
    setLoading(true);setErr("");
    try{
      let image_url=null;
      if(imgFile){try{image_url=await uploadImg(imgFile);}catch(ie){setErr(ie.message);setLoading(false);return;}}
      await sb("properties",{method:"POST",body:JSON.stringify({title:form.title,type:form.type,status:form.status,price:Number(form.price),bhk:form.bhk,location:form.location,area:form.area?form.area+" sqft":null,furnishing:form.furnishing,available:form.available,description:form.description,tag:form.tag,image_url,owner_name:form.owner_name,owner_email:form.owner_email,owner_phone:form.owner_phone,approved:false})});
      setDone(true);
    }catch(ex){setErr("Error: "+(ex.message||"Something went wrong"));}
    setLoading(false);
  };
  if(done)return(<div className="screen" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,minHeight:"80vh"}}><div style={{fontSize:72,marginBottom:20}}>🎉</div><div style={{fontFamily:"'Nunito',sans-serif",fontSize:24,fontWeight:900,marginBottom:10,textAlign:"center"}}>Property Posted!</div><div style={{fontSize:15,color:"#6B7280",textAlign:"center",marginBottom:32}}>✅ Submitted! We will review and make it live within 24 hours.</div><button className="btn-blue" style={{maxWidth:240}} onClick={()=>setDone(false)}>Post Another</button></div>);
  return(
    <div className="screen">
      <div style={{background:"#fff",padding:"20px 16px 16px",boxShadow:"0 1px 8px rgba(0,0,0,0.06)",position:"sticky",top:0,zIndex:50}}>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900}}>Post Your Property 📤</div>
        <div style={{fontSize:13,color:"#6B7280",marginTop:4}}>Fill in the details to list your property</div>
      </div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
        {err&&<div style={{background:"#FEF2F2",color:"#DC2626",padding:"12px 16px",borderRadius:12,fontSize:13,fontWeight:600}}>{err}</div>}
        <div className="card" style={{padding:16}}><div className="stitle">Your Details</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div className="tlabel">Full Name *</div><input style={IS(errs.owner_name)} value={form.owner_name} onChange={e=>{f("owner_name",e.target.value);setErrs(p=>({...p,owner_name:""}));}} placeholder="Your name"/>{errs.owner_name&&<div className="emsg">{errs.owner_name}</div>}</div>
            <div><div className="tlabel">Contact Number *</div><input style={IS(errs.owner_phone)} type="tel" value={form.owner_phone} onChange={e=>{f("owner_phone",e.target.value);setErrs(p=>({...p,owner_phone:""}));}} placeholder="Phone number"/>{errs.owner_phone&&<div className="emsg">{errs.owner_phone}</div>}</div>
            <div><div className="tlabel">Email (optional)</div><input style={IS(false)} type="email" value={form.owner_email} onChange={e=>f("owner_email",e.target.value)} placeholder="Email address"/></div>
          </div>
        </div>
        <div className="card" style={{padding:16}}><div className="stitle">Property Details</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div className="tlabel">Title *</div><input style={IS(errs.title)} value={form.title} onChange={e=>{f("title",e.target.value);setErrs(p=>({...p,title:""}));}} placeholder="e.g. 2BHK Flat in Salt Lake"/>{errs.title&&<div className="emsg">{errs.title}</div>}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><div className="tlabel">Type</div><select style={{...IS(false),background:"#fff"}} value={form.type} onChange={e=>f("type",e.target.value)}>{["Residential","Commercial","Rental"].map(t=><option key={t}>{t}</option>)}</select></div>

          </div>
        </div>
        <div className="card" style={{padding:16}}><div className="stitle">Upload Photo</div>
          <div onClick={()=>document.getElementById("imgUp").click()} style={{border:"2px dashed #BFDBFE",borderRadius:12,padding:24,textAlign:"center",cursor:"pointer",background:"#EFF6FF"}}>
            {imgPrev?<img src={imgPrev} style={{maxHeight:180,borderRadius:10,objectFit:"cover",width:"100%"}}/>:<><div style={{fontSize:36,marginBottom:8}}>📷</div><div style={{fontSize:14,color:"#2563EB",fontWeight:700}}>Tap to upload photo</div><div style={{fontSize:12,color:"#93C5FD",marginTop:4}}>JPG, PNG up to 10MB</div></>}
          </div>
          <input id="imgUp" type="file" accept="image/*" onChange={onImg} style={{display:"none"}}/>
        </div>
        <button className="btn-blue" onClick={submit} disabled={loading} style={{opacity:loading?0.7:1,padding:16,fontSize:16}}>{loading?"Posting...":"📤 Post Property"}</button>
        <button style={{background:"#F3F4F6",color:"#374151",border:"none",borderRadius:12,padding:14,fontWeight:700,fontSize:15,cursor:"pointer",width:"100%"}}>💾 Save Draft</button>
      </div>
    </div>
  );
}

/* SAVED */
function SavedScreen({savedIds,onView,onSave}){
  const saved=SEED.filter(p=>savedIds.includes(p.id));
  return(
    <div className="screen">
      <div style={{background:"#fff",padding:"20px 16px 16px",boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900}}>Saved Properties ❤️</div>
        <div style={{fontSize:13,color:"#6B7280",marginTop:4}}>{saved.length} saved</div>
      </div>
      <div style={{padding:16}}>
        {saved.length===0?(<div style={{textAlign:"center",padding:"80px 0",color:"#9CA3AF"}}><div style={{fontSize:64,marginBottom:16}}>🤍</div><div style={{fontWeight:700,fontSize:18,color:"#374151",marginBottom:8}}>No saved properties yet</div><div style={{fontSize:14}}>Tap ❤️ to save properties you like.</div></div>)

/* ADMIN */
function AdminScreen(){
  const [listings,setListings]=useState([]);const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("pending");const [actL,setActL]=useState(null);
  const [dbErr,setDbErr]=useState("");const [unlocked,setUnlocked]=useState(false);
  const [pin,setPin]=useState("");const [pinErr,setPinErr]=useState("");
  const load=async()=>{setLoading(true);setDbErr("");try{const d=await sb("properties?order=created_at.desc");setListings(d);}catch(e){setDbErr("Could not load: "+e.message);}setLoading(false);};
  useEffect(()=>{if(unlocked)load();},[unlocked]);
  const approve=async(id)=>{setActL(id+"_a");try{await sb(`properties?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({approved:true})});await load();}catch{}setActL(null);};
  const reject=async(id)=>{setActL(id+"_r");try{await sb(`properties?id=eq.${id}`,{method:"DELETE"});await load();}catch{}setActL(null);};
  const doPin=()=>{if(pin===ADMIN_PIN){setUnlocked(true);setPinErr("");setPin("");}else{setPinErr("Incorrect PIN. Try again.");setPin("");}};
  const pending=listings.filter(l=>!l.approved);const approved=listings.filter(l=>l.approved);const shown=tab==="pending"?pending:approved;
  if(!unlocked)return(
    <div className="screen" style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32,minHeight:"80vh"}}>
      <div style={{width:72,height:72,background:"linear-gradient(135deg,#1E3A5F,#2563EB)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:20,boxShadow:"0 8px 24px rgba(37,99,235,0.3)"}}>🔐</div>
      <div style={{fontFamily:"'Nunito',sans-serif",fontSize:24,fontWeight:900,color:"#111827",marginBottom:6}}>Admin Access</div>
      <div style={{fontSize:14,color:"#6B7280",marginBottom:28,textAlign:"center"}}>Enter your 4-digit PIN to access admin panel</div>
      {pinErr&&<div style={{background:"#FEF2F2",color:"#DC2626",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,marginBottom:14,width:"100%",textAlign:"center"}}>{pinErr}</div>}
      <input type="password" inputMode="numeric" maxLength={6} value={pin} onChange={e=>{setPin(e.target.value);setPinErr("");}} placeholder="Enter PIN" style={{width:"100%",padding:16,borderRadius:14,border:"1.5px solid #E5E7EB",fontSize:22,textAlign:"center",letterSpacing:10,outline:"none",marginBottom:16,background:"#F9FAFB"}} onKeyDown={e=>e.key==="Enter"&&doPin()}/>
      <button className="btn-blue" onClick={doPin}>🔓 Unlock Admin Panel</button>
      <div style={{fontSize:12,color:"#9CA3AF",marginTop:14}}>Default PIN: 1234</div>
    </div>
  );
  return(
    <div className="screen">
      <div style={{background:"linear-gradient(135deg,#1E3A5F,#2563EB)",padding:"24px 16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Admin Panel</div><div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>Listing Management</div></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={load} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"8px 12px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>🔄</button>
            <button onClick={()=>setUnlocked(false)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"8px 12px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>🔒 Lock</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[["📋",pending.length,"Pending"],["✅",approved.length,"Live"],["📊",listings.length,"Total"]].map(([icon,count,label])=>(
            <div key={label} style={{flex:1,background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:16}}>{icon}</div><div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>{count}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:600}}>{label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"0 16px"}}>
        {[["pending",`⏳ Pending (${pending.length})`],["approved",`✅ Live (${approved.length})`]].map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:"14px 0",border:"none",background:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:tab===key?"#2563EB":"#9CA3AF",borderBottom:`2px solid ${tab===key?"#2563EB":"transparent"}`}}>{label}</button>
        ))}
      </div>
      <div style={{padding:16}}>
        {loading?<div style={{textAlign:"center",padding:"48px 0",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>⏳</div><div style={{fontWeight:600}}>Loading...</div></div>
        :dbErr?<div style={{background:"#FEF2F2",color:"#DC2626",padding:16,borderRadius:12,fontSize:13}}>{dbErr}</div>
        :shown.length===0?<div style={{textAlign:"center",padding:"48px 0",color:"#9CA3AF"}}><div style={{fontSize:48,marginBottom:12}}>{tab==="pending"?"✅":"🏠"}</div><div style={{fontWeight:700,fontSize:16}}>{tab==="pending"?"No pending listings":"No live listings yet"}</div></div>
        :shown.map(l=>(
          <div key={l.id} className="card ani" style={{marginBottom:12}}>
            <div style={{display:"flex",gap:12,padding:14}}>
              <div style={{width:72,height:56,borderRadius:10,overflow:"hidden",background:"#F3F4F6",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {l.image_url?<img src={l.image_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24}}>🏠</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{l.title}</div>
                <div style={{fontSize:12,color:"#6B7280",marginBottom:3}}>{l.type} · {l.status} · {l.location}</div>
                <div style={{fontSize:14,fontWeight:800,color:"#2563EB",fontFamily:"'Nunito',sans-serif"}}>{fmtPrice(l.price,l.status)}</div>
                {l.owner_name&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>👤 {l.owner_name} · 📞 {l.owner_phone}</div>}
              </div>
            </div>
            {tab==="pending"&&(
              <div style={{display:"flex",gap:10,padding:"0 14px 14px"}}>
                <button onClick={()=>approve(l.id)} disabled={!!actL} style={{flex:1,background:"#10B981",color:"#fff",border:"none",borderRadius:10,padding:"11px 0",fontWeight:700,fontSize:14,cursor:"pointer",opacity:actL===l.id+"_a"?0.6:1}}>{actL===l.id+"_a"?"...":"✓ Approve"}</button>
                <button onClick={()=>reject(l.id)} disabled={!!actL} style={{flex:1,background:"#FEF2F2",color:"#DC2626",border:"1.5px solid #FCA5A5",borderRadius:10,padding:"11px 0",fontWeight:700,fontSize:14,cursor:"pointer",opacity:actL===l.id+"_r"?0.6:1}}>{actL===l.id+"_r"?"...":"✗ Reject"}</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* MAIN APP */
function App(){
  const [screen,setScreen]=useState("auth");
  const [tab,setTab]=useState("home");
  const [detailProp,setDetailProp]=useState(null);
  const [savedIds,setSavedIds]=useState([]);
  const onSave=id=>setSavedIds(p=>p.includes(id)?p.filter(i=>i!==id):[...p,id]);
  const onView=p=>{setDetailProp(p);setScreen("detail");};
  const onBack=()=>{setDetailProp(null);setScreen("main");};
  if(screen==="auth")return<AuthScreen onLogin={()=>setScreen("main")}/>;
  if(screen==="detail"&&detailProp)return<DetailScreen p={detailProp} onBack={onBack} saved={savedIds.includes(detailProp.id)} onSave={onSave}/>;
  const renderTab=()=>{
    switch(tab){
      case"home":return<HomeScreen onView={onView} savedIds={savedIds} onSave={onSave}/>;
      case"saved":return<SavedScreen savedIds={savedIds} onView={onView} onSave={onSave}/>;
      case"add":return<AddScreen/>;
      case"admin":return<AdminScreen/>;
      case"profile":return<ProfileScreen onNavigate={t=>setTab(t)}/>;
      default:return<HomeScreen onView={onView} savedIds={savedIds} onSave={onSave}/>;
    }
  };
  return(
    <div>
      {renderTab()}
      <nav className="bnav">
        {[["home","🏠","Home"],["saved","❤️","Saved"],["add","➕","Post"],["admin","🔐","Admin"],["profile","👤","Profile"]].map(([t,icon,label])=>(
          <div key={t} className={`ni ${tab===t?"active":""}`} onClick={()=>setTab(t)}>
            <span style={{fontSize:20}}>{icon}</span><span>{label}</span>
          </div>
        ))}
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
